services:
  db:
    image: postgres:17-alpine
    container_name: invoice-generator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
      POSTGRES_DB: invoice_generator
    ports:
      # Host 5438 -> container 5432 (5432-5436/5439 already taken on this machine)
      - "5438:5432"
    volumes:
      - invoice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice -d invoice_generator"]
      interval: 3s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for logos / signatures
  minio:
    image: minio/minio:latest
    container_name: invoice-generator-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000" # S3 API
      - "9101:9001" # web console
    volumes:
      - invoice_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket and make it publicly readable for logo URLs
  minio-init:
    image: minio/mc:latest
    container_name: invoice-generator-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/invoice-uploads &&
      mc anonymous set download local/invoice-uploads &&
      echo 'bucket ready';
      "

volumes:
  invoice_pgdata:
  invoice_miniodata:
